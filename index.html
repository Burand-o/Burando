<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var params = new URLSearchParams(window.location.search);
    var path = params.get('path') || window.location.pathname;
    var segments = path.split('/').filter(Boolean);

    var type = null;
    var id = null;

    var productIndex = segments.indexOf('product');
    var brandIndex   = segments.indexOf('brand');

    if (productIndex !== -1 && segments[productIndex + 1]) {
      type = 'product';
      id = segments[productIndex + 1];
    } else if (brandIndex !== -1 && segments[brandIndex + 1]) {
      type = 'brand';
      id = segments[brandIndex + 1];
    }

    if (type && id) {
      var customScheme = 'burando://' + type + '/' + id;
      var intentUrl = 'intent://' + type + '/' + id
        + '#Intent;scheme=burando;package=com.example.burando;end';

      var ua = navigator.userAgent || '';
      if (/android/i.test(ua)) {
        window.location.href = intentUrl;
      } else {
        window.location.href = customScheme;
      }
    }

    setTimeout(function () {
      document.getElementById('msg').style.display = 'block';
    }, 2500);
  </script>
</head>
<body>
  <p>Opening Burando App...</p>
  <p id="msg" style="display:none">
    Don't have the app?
    <a href="https://play.google.com/store/apps/details?id=com.example.burando">Download it here</a>
  </p>
</body>
</html>
