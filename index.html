<!DOCTYPE html>
<html>
<head>
  <script>
    const params = new URLSearchParams(window.location.search);
    const brandId = params.get('brandId');
    const productId = params.get('productId');

    if (brandId) {
      window.location.href = `burando://brand/${brandId}`;
      setTimeout(() => {
        document.getElementById('msg').style.display = 'block';
      }, 2500);
    } else if (productId) {
      window.location.href = `burando://product/${productId}`;
      setTimeout(() => {
        document.getElementById('msg').style.display = 'block';
      }, 2500);
    } else {
      document.getElementById('msg').style.display = 'block';
    }
  </script>
</head>
<body>
  <p>App Opening...</p>
  <p id="msg" style="display:none">
    Please install the Burando app to open this link.
  </p>
</body>
</html>
