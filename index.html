<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var params = new URLSearchParams(window.location.search);
    var path = params.get('path') || window.location.pathname;
    var segments = path.split('/').filter(Boolean);

    var deepLink = null;

    var productIndex = segments.indexOf('product');
    var brandIndex   = segments.indexOf('brand');

    if (productIndex !== -1 && segments[productIndex + 1]) {
      deepLink = 'burando://product/' + segments[productIndex + 1];
    } else if (brandIndex !== -1 && segments[brandIndex + 1]) {
      deepLink = 'burando://brand/' + segments[brandIndex + 1];
    }

    if (deepLink) {
      window.location.href = deepLink;
    }

    setTimeout(function () {
      document.getElementById('msg').style.display = 'block';
    }, 2500);
  </script>
</head>
<body>
  <p>Opening Burando App...</p>
  <p id="msg" style="display:none">
    Don't have the app?
    <a href="https://play.google.com/store/apps/details?id=com.example.burando">Download it here</a>
  </p>
</body>
</html>
